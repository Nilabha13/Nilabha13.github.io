            Here are few of my hobbies. If you want to know more about them,

          </p>

        <div class="form-check form-switch" data-aos="flip-down">

            type="checkbox"
            id="flexSwitchCheckDefault"
          />

        <div

        <div

        <!-- Button trigger modal -->
        <button
          type="button"
          class="btn btn-success mt-3"
          data-bs-toggle="modal"
          data-bs-target="#hobbyModal"
          id="know-btn"
          data-aos="zoom-in-up"
          data-aos-delay="600"
        >
          Know More
        </button>

        <!-- Modal -->
        <div
          class="modal fade"
          id="hobbyModal"
          tabindex="-1"
          aria-labelledby="hobbyModalLabel"
          aria-hidden="true"
        >
          <div class="modal-dialog">
            <div class="modal-content">
              <div class="modal-header">
                <h5 class="modal-title" id="hobbyModalLabel">
                  Confirm Your Choices
                </h5>
                <button
                  type="button"
                  class="btn-close"
                  data-bs-dismiss="modal"
                  aria-label="Close"
                ></button>
              </div>
              <div class="modal-body" id="confirmation-dialogue"></div>
              <div class="modal-footer">
                <button
                  type="button"
                  class="btn btn-secondary"
                  data-bs-dismiss="modal"
                >
                  Close
                </button>
                <button
                  type="button"
                  class="btn btn-primary"
                  id="confirm-btn"
                  data-bs-dismiss="modal"
                >
                  Confirm
                </button>
              </div>
            </div>
          </div>
        </div>
